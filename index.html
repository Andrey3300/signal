    <script>
// ==========================================
// FRASES BASE DO TERMINAL DE NEGOCIAÇÃO
// ==========================================

const ANALYZING_PHRASES = [
    "Digitalizando todos os prazos à procura de um ponto de entrada...",
    "Analisando a liquidez do mercado em tempo real...",
    /* ... */
];

const REGIONAL_PHRASES = [
    {text: "A bolsa de valores de Tóquio abriu com ganhos, o iene reage à saída de capital", pairs: ['NZD/USD', 'AUD/CAD', 'GBP/NZD'], direction: 'UP'},
    /* ... */
];

const ENTRY_PHRASES = [
    "Ponto de entrada identificado. Formando sinal de negociação...",
    /* ... */
];

const RESULT_PHRASES = [
    "Negociação fechada. Analisando resultado...",
    /* ... */
];

const ACCESS_KEYS = {
    'MAT400': { limit: 1 * 60 * 60 * 1000, name: 'MAT400 (1 hora)', hours: 1 },
    'MAT500': { limit: 2 * 60 * 60 * 1000, name: 'MAT500 (2 horas)', hours: 2 },
    'MAT600': { limit: 3 * 60 * 60 * 1000, name: 'MAT600 (3 horas)', hours: 3 },
    'MAT800': { limit: 4 * 60 * 60 * 1000, name: 'MAT800 (4 horas)', hours: 4 },
    'MAT1000': { limit: 5 * 60 * 60 * 1000, name: 'MAT1000 (5 horas)', hours: 5 }
};

var session = {
    name: '',
    accessKey: '',
    signalsUsed: 0,
    limit: 0,
    isActive: false,
    currentAsset: null,
    currentDirection: null,
    startTime: null,
    uptimeInterval: null,
    statsInterval: null,
    botCycleInterval: null,
    timerInterval: null,
    isVIP: true,
    accessEndTime: null,
    accessCheckInterval: null,
    usedPhraseIndices: [],
    cycleCount: 0,
    usedAccessKey: false  // NEW: Flag to track access key usage
};

// ... (Existing Functions remain unchanged, except for the login handling) ...

function handleLogin(e) {
    if (e) e.preventDefault();

    var keyInput = document.getElementById('accessKey');
    var nameInput = document.getElementById('userName');
    var errorDiv = document.getElementById('errorMessage');
    var successDiv = document.getElementById('successMessage');

    var key = keyInput.value.trim().toUpperCase();
    var name = nameInput.value.trim();

    if (!name) name = 'Trader';

    errorDiv.style.display = 'none';
    successDiv.style.display = 'none';

    if (ACCESS_KEYS[key] && !session.usedAccessKey) {  // Check access key validity AND if it's already been used
        session.accessKey = key;
        session.name = name;
        session.limit = ACCESS_KEYS[key].limit;
        session.signalsUsed = 0;
        session.isVIP = true;
        session.accessEndTime = Date.now() + ACCESS_KEYS[key].limit;

        localStorage.setItem('aura_vip_key', key);
        localStorage.setItem('aura_vip_start', Date.now().toString());
        localStorage.setItem('aura_vip_end', session.accessEndTime.toString());

        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('terminalScreen').classList.add('active');
        updateSessionInfo();
        initializeChat();
        session.usedAccessKey = true; // Mark the access key as used
    } else {
        errorDiv.textContent = 'Chave de acesso inválida ou já utilizada.';
        errorDiv.style.display = 'block';
    }
}

function renewKey() {
    // Clear local storage to force re-login
    localStorage.removeItem('aura_vip_key');
    localStorage.removeItem('aura_vip_start');
    localStorage.removeItem('aura_vip_end');
    session.usedAccessKey = false;
    location.reload();
}
// ... (Existing code remains unchanged) ...
</script>
